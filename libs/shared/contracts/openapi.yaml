info:
  title: LobsterAI API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/v1/agents:
    get:
      operationId: get_api_v1_agents
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponseSchema"
          description: Successful response
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: VALIDATION_FAILED
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: UNAUTHENTICATED
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: PERMISSION_DENIED
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
          description: NOT_FOUND
        "429":
          content:
            application/json:
              schema:
