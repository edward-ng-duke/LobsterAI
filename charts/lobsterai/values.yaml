global:
  profile: production
  productionNetwork: offline
  imagePullPolicy: IfNotPresent

images:
  web:
    repository: registry.internal/lobsterai/lobster-web
    digest: sha256:1111111111111111111111111111111111111111111111111111111111111111
  api:
    repository: registry.internal/lobsterai/lobster-api
    digest: sha256:2222222222222222222222222222222222222222222222222222222222222222
  worker:
    repository: registry.internal/lobsterai/lobster-worker
    digest: sha256:3333333333333333333333333333333333333333333333333333333333333333
  runtimeOrchestrator:
    repository: registry.internal/lobsterai/lobster-runtime-orchestrator
    digest: sha256:4444444444444444444444444444444444444444444444444444444444444444

components:
  web:
    replicas: 2
    port: 8080
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 500m, memory: 512Mi }
    probe: { initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 3 }
  api:
    replicas: 2
    port: 3000
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits: { cpu: 1000m, memory: 1Gi }
    probe: { initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 3 }
  worker:
    replicas: 1
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits: { cpu: 1000m, memory: 1Gi }
    probe: { initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 3 }
  runtimeOrchestrator:
    replicas: 1
    port: 3001
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits: { cpu: 1000m, memory: 1Gi }
    probe: { initialDelaySeconds: 5, periodSeconds: 10, timeoutSeconds: 3, failureThreshold: 3 }

config:
  logLevel: info
  modelProxyUrl: http://lobster-model-proxy.lobster-svc.svc.cluster.local
  objectStoreEndpoint: http://lobster-object-store.lobster-svc.svc.cluster.local
  secretRef:
    name: lobsterai-runtime-secrets
    databaseUrlKey: database-url
    redisUrlKey: redis-url

security:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

networkPolicy:
  enabled: true
  serviceNamespace: lobster-svc
  ingressNamespace: ingress-system
  dnsNamespace: kube-system

quota:
  requestsCpu: "4"
  requestsMemory: 8Gi
  limitsCpu: "8"
  limitsMemory: 16Gi
  pods: "30"

sandbox:
  enabled: false
  image:
    repository: registry.internal/lobsterai/lobster-openclaw-runtime
    digest: sha256:5555555555555555555555555555555555555555555555555555555555555555
  runtimeClassName: ""
  serviceAccountName: ""
  gatewayPort: 18789
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: 2000m, memory: 3Gi }
