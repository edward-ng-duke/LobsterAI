{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lobsterai.fullname" . }}-default-deny
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lobsterai.fullname" . }}-allow-dns
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.dnsNamespace }}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lobsterai.fullname" . }}-web-to-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: web
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.serviceNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: api
      ports:
        - { protocol: TCP, port: {{ .Values.components.api.port }} }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lobsterai.fullname" . }}-worker-to-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: worker
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.serviceNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: api
      ports:
        - { protocol: TCP, port: {{ .Values.components.api.port }} }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lobsterai.fullname" . }}-orchestrator-to-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: runtime-orchestrator
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.serviceNamespace }}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: api
      ports:
        - { protocol: TCP, port: {{ .Values.components.api.port }} }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lobsterai.fullname" . }}-api-from-components
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.serviceNamespace }}
          podSelector:
            matchExpressions:
              - key: app.kubernetes.io/component
                operator: In
                values: [web, worker, runtime-orchestrator]
      ports:
        - { protocol: TCP, port: {{ .Values.components.api.port }} }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "lobsterai.fullname" . }}-allow-web-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - { protocol: TCP, port: {{ .Values.components.web.port }} }
{{- end }}
