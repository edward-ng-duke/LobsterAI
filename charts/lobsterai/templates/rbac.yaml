apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "lobsterai.fullname" . }}-runtime-observer
  labels:
    {{- include "lobsterai.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lobsterai.fullname" . }}-runtime-observer
  labels:
    {{- include "lobsterai.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "lobsterai.fullname" . }}-runtime-orchestrator
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "lobsterai.fullname" . }}-runtime-observer
