apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lobsterai.fullname" . }}-worker
  labels:
    {{- include "lobsterai.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.components.worker.replicas }}
  selector:
    matchLabels:
      {{- include "lobsterai.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lobsterai.selectorLabels" (dict "Chart" .Chart "Release" .Release "Values" .Values "component" "worker") | nindent 8 }}
        app.kubernetes.io/part-of: lobsterai
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: {{ include "lobsterai.fullname" . }}-service
      automountServiceAccountToken: false
      securityContext:
        {{- include "lobsterai.podSecurityContext" . | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.images.worker.repository }}@{{ .Values.images.worker.digest }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "lobsterai.containerSecurityContext" . | nindent 12 }}
          envFrom:
            - configMapRef: { name: {{ include "lobsterai.fullname" . }}-config }
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef: { name: {{ .Values.config.secretRef.name }}, key: {{ .Values.config.secretRef.databaseUrlKey }} }
            - name: REDIS_URL
              valueFrom:
                secretKeyRef: { name: {{ .Values.config.secretRef.name }}, key: {{ .Values.config.secretRef.redisUrlKey }} }
          readinessProbe: &workerProbe
            exec: { command: ["node", "-e", "require('fs').accessSync('/tmp/lobster-worker-ready')"] }
            {{- toYaml .Values.components.worker.probe | nindent 12 }}
          livenessProbe: *workerProbe
          resources:
            {{- toYaml .Values.components.worker.resources | nindent 12 }}
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 64Mi }
