name: SaaS Scaffold

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'charts/**'
      - 'docker/**'
      - 'docs/poc/**'
      - 'docs/supply-chain/**'
      - 'libs/**'
      - 'scripts/check-saas-build-artifacts.mjs'
      - 'scripts/clean-saas-build.mjs'
      - 'scripts/check-saas-scaffold.mjs'
      - 'scripts/expect-saas-stage-gate.mjs'
      - 'scripts/run-saas-stage-gate.mjs'
      - 'scripts/saas-stage-gates.json'
      - 'scripts/saas-workspace-registry.json'
      - 'scripts/saas-workspace-policy.mjs'
      - 'tests/scaffold.test.ts'
      - 'tests/scaffold-*.test.ts'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - '.github/workflows/saas-scaffold.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'charts/**'
      - 'docker/**'
      - 'docs/poc/**'
      - 'docs/supply-chain/**'
      - 'libs/**'
      - 'scripts/check-saas-build-artifacts.mjs'
      - 'scripts/clean-saas-build.mjs'
      - 'scripts/check-saas-scaffold.mjs'
      - 'scripts/expect-saas-stage-gate.mjs'
      - 'scripts/run-saas-stage-gate.mjs'
      - 'scripts/saas-stage-gates.json'
      - 'scripts/saas-workspace-registry.json'
      - 'scripts/saas-workspace-policy.mjs'
      - 'tests/scaffold.test.ts'
      - 'tests/scaffold-*.test.ts'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - '.github/workflows/saas-scaffold.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: npm
      - run: npm ci
      - run: npm run scaffold:check
      - name: Verify deferred P00 gate entry points are explicit
        run: |
          node scripts/expect-saas-stage-gate.mjs test:e2e
          node scripts/expect-saas-stage-gate.mjs contracts:check
          node scripts/expect-saas-stage-gate.mjs prisma:validate
          node scripts/expect-saas-stage-gate.mjs supply-chain:check
          node scripts/expect-saas-stage-gate.mjs docker:build:check
          node scripts/expect-saas-stage-gate.mjs helm:lint
          node scripts/expect-saas-stage-gate.mjs poc:v1:check
      - run: npm run lint:saas
      - run: npm run typecheck
      - run: npm run test:scaffold
      - run: npm test
      - run: npm run build:saas
      - name: Verify Web production bundle
        run: |
          test -f apps/web/dist/index.html
          find apps/web/dist/assets -type f -name '*.js' -print -quit | grep -q .
      - name: Verify legacy renderer and Electron compatibility
        run: |
          npm run build
          npm run compile:electron
      - name: Verify tracked sources remain reproducible
        run: git diff --exit-code
